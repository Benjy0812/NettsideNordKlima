<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nordisk Vær</title>
    <script type="module" crossorigin src="/NettsideNordKlima/assets/index-CE8vQ7LE.js"></script>
    <link rel="stylesheet" crossorigin href="/NettsideNordKlima/assets/index-Br7ifDUi.css">
  </head>
  <body
    class="flex min-h-screen flex-col text-center font-[Arial,Helvetica,sans-serif]"
  >
    <header>
      <h1 class="mx-auto my-2.5">Nordisk Vær</h1>
      <div class="mx-auto my-0 flex max-w-125 flex-wrap justify-center gap-2">
        <input
          class="m-0 min-w-30 flex-1 rounded border border-[#cccccc] p-2"
          type="text"
          id="location-input"
          value="Tromsø"
          placeholder="Lokasjon"
        />
        <button
          class="m-0 flex rounded border border-[#cccccc] bg-white px-3 py-2 hover:cursor-pointer hover:bg-[#f0f0f0]"
          id="fetch-button"
          type="button"
        >
          Hent
        </button>
        <select
          class="w-15 rounded-md border border-gray-500 text-center"
          id="temp-toggle"
        >
          <option value="Celsius">°C</option>
          <option value="Fahrenheit">°F</option>
        </select>
      </div>
    </header>
    <main>
      <p class="mx-auto my-2.5 font-bold" id="location-title">Tromsø</p>
      <div
        class="inline-flex transform-gpu flex-col items-center gap-2 will-change-transform *:cursor-pointer *:transition-transform *:duration-100 *:hover:scale-125"
      >
        <p
          class="m-0 inline-block w-fit rounded p-1.25 font-bold shadow-[0_0_10px_rgba(0,0,0,0.25)]"
          id="temp"
        >
          Temperatur: 0.0 °C
        </p>
        <p
          class="m-0 inline-block w-fit rounded p-1.25 font-bold shadow-[0_0_10px_rgba(0,0,0,0.25)]"
          id="pressure"
        >
          Trykk: 0 hPa
        </p>
        <p
          class="m-0 inline-block w-fit rounded p-1.25 font-bold shadow-[0_0_10px_rgba(0,0,0,0.25)]"
          id="humidity"
        >
          Luftfuktighet: 00.0 %
        </p>
        <p
          class="m-0 inline-block w-fit rounded p-1.25 font-bold shadow-[0_0_10px_rgba(0,0,0,0.25)]"
          id="clouds"
        >
          Skyer: 00.0 %
        </p>
        <p
          class="m-0 inline-block w-fit rounded p-1.25 font-bold shadow-[0_0_10px_rgba(0,0,0,0.25)]"
          id="wind"
        >
          Vind: 0.0 m/s fra 00°
        </p>
        <p
          class="m-0 inline-block w-fit rounded p-1.25 font-bold shadow-[0_0_10px_rgba(0,0,0,0.25)]"
          id="symbol"
        >
          Vær: type
        </p>
      </div>
      <div class="flex flex-col items-center gap-2">
        <br />
        <p class="text-2xl font-bold">Wind direction:</p>
        <canvas
          class="rounded-2xl border border-gray-500"
          id="arrow"
          width="100"
          height="100"
        ></canvas>
      </div>
    </main>
    <footer class="mt-auto flex flex-col items-center">
      <p>
        © 2026 Basert på data fra
        <a href="https://www.met.no/" target="_blank">MET</a>
      </p>
      <p class="text-center">
        <a rel="license" href="http://creativecommons.org/licenses/by/4.0/">
          <img
            class="mx-auto"
            alt="Creative Commons-lisens"
            src="https://i.creativecommons.org/l/by/4.0/88x31.png"
          /> </a
        >Dette verk er lisensieret under en
        <a rel="license" href="http://creativecommons.org/licenses/by/4.0/"
          >Creative Commons Navngivelse 4.0 Internasjonal lisens</a
        >
      </p>
    </footer>
  </body>
</html>
